<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Graeme Cassidy Clark | Works</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="stylesheet" href="styles.css">

  <body>

      <a class="site-name" href="/">Graeme Cassidy Clark</a>

      <section class="gallery" aria-label="Portfolio images"></section>
    </main>

    <dialog class="lightbox" aria-label="Image preview">
      <button class="close" type="button" aria-label="Close preview">×</button>
      <img alt="">
      <video controls loop playsinline></video>
      <div class="lightbox-meta">
        <span></span>
        <strong></strong>
      </div>
    </dialog>

    <script src="script.js?v=4"></script>
